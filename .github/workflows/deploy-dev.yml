name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
      REMOTE_APP_DIR: /opt/doppler-indexer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ghcr.io/${{ github.repository }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEV_SERVER_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H '${{ secrets.DEV_SERVER_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy deploy assets to server
        run: |
          ssh '${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}' "mkdir -p '$REMOTE_APP_DIR'"
          scp deploy/dev/compose.yaml deploy/dev/redeploy.sh '${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:$REMOTE_APP_DIR/'
          ssh '${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}' "chmod +x '$REMOTE_APP_DIR/redeploy.sh'"

      - name: Deploy on server
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh '${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}' \
            "cd '$REMOTE_APP_DIR' && IMAGE_REF='$IMAGE_REF' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' APP_DIR='$REMOTE_APP_DIR' ./redeploy.sh"
