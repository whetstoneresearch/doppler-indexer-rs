global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: "doppler-indexer"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          service: "doppler-indexer"
          environment: "local"
